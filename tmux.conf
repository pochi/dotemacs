# ================================
# Tmux Configuration for Claude Code
# Optimized for terminal-based development with Emacs
# ================================

# ===== Prefix Key Configuration =====

# Change prefix from C-b to C-t (Emacs-friendly)
unbind C-b
set-option -g prefix C-t
bind-key C-t send-prefix

# C-t C-t to switch to last window
bind-key C-t last-window

# C-t t to send C-t to the program (transpose-chars in Emacs)
bind-key t send-prefix

# ===== General Settings =====

# Enable mouse support (scroll, select panes, resize)
set -g mouse on

# Set default terminal to support 256 colors and true color
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Enable true color support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Set escape time to 0 for faster command sequences (important for Emacs)
set -sg escape-time 0

# Enable OSC 52 clipboard passthrough (for Emacs clipetty)
set -s set-clipboard on
set -ag terminal-overrides "vte*:XT:Ms=\\E]52;c;%p2%s\\7,xterm*:XT:Ms=\\E]52;c;%p2%s\\7"

# Increase scrollback buffer size
set -g history-limit 50000

# Start window and pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when a window is closed
set -g renumber-windows on

# Enable focus events (useful for Emacs and other editors)
set -g focus-events on

# Aggressive resize (useful for multi-monitor setups)
setw -g aggressive-resize on

# ===== Key Bindings =====

# Reload configuration file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with intuitive keys (like Emacs)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Create new window with current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (Vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane navigation (Alt + arrow keys, no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane resizing (Vim-style with repeat)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation (Shift + arrow keys, no prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window

# Quick pane switching (Alt + number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Synchronize panes (toggle)
bind S setw synchronize-panes

# ===== Copy Mode (Emacs key bindings) =====

# Use Emacs key bindings in copy mode
setw -g mode-keys emacs

# Enter copy mode with C-t [
bind [ copy-mode

# Paste from tmux buffer with C-t ]
bind ] paste-buffer

# macOS clipboard integration (requires reattach-to-user-namespace)
if-shell "uname | grep -q Darwin" \
  "set -g default-command 'reattach-to-user-namespace -l ${SHELL}'"

# Copy to system clipboard in copy mode
bind -T copy-mode M-w send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode C-w send-keys -X copy-pipe-and-cancel "pbcopy"

# ===== Status Bar Configuration =====

# Update status bar every second
set -g status-interval 1

# Status bar position (top or bottom)
set -g status-position bottom

# Status bar colors (match modus-vivendi theme)
set -g status-style 'bg=#1e1e1e fg=#c6c6c6'

# Left status: session name
set -g status-left-length 40
set -g status-left '#[fg=#79a8ff,bold] #S #[fg=#c6c6c6]│ '

# Right status: date and time
set -g status-right-length 60
set -g status-right '#[fg=#c6c6c6]│ #[fg=#79a8ff]%Y-%m-%d #[fg=#c6c6c6]│ #[fg=#79a8ff,bold]%H:%M:%S '

# Window status format
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#1e1e1e,bg=#79a8ff,bold] #I:#W '

# Window activity notification
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style 'fg=#ff8059,bold'

# Pane border colors
set -g pane-border-style 'fg=#5a5a5a'
set -g pane-active-border-style 'fg=#79a8ff'

# Message colors
set -g message-style 'fg=#1e1e1e bg=#79a8ff bold'

# ===== Tmux Plugin Manager (TPM) =====

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'

# ===== Plugin Configuration =====

# tmux-resurrect: Restore Emacs with buffers
set -g @resurrect-strategy-emacs 'desktop'

# tmux-continuum: Auto-save tmux sessions every 15 minutes
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-yank: Copy to system clipboard
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# tmux-open: Open highlighted text
set -g @open 'x'
set -g @open-editor 'C-x'

# ===== macOS Specific Settings =====

# Fix for macOS clipboard (requires reattach-to-user-namespace)
if-shell "uname | grep -q Darwin" \
  "bind-key -T copy-mode M-w send-keys -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'"

# ===== Custom Functions =====

# Toggle status bar visibility
bind b set-option status

# Clear screen and scrollback buffer
bind C-l send-keys 'C-l' \; clear-history

# Create new session
bind N command-prompt -p "New session name:" "new-session -s '%%'"

# Rename session
bind R command-prompt -I "#S" "rename-session '%%'"

# ===== Development Shortcuts =====

# Quick pane layouts for development
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# Split window for testing (80/20 split)
bind T split-window -v -p 20 -c "#{pane_current_path}"

# ===== Notes and Tips =====

# Prefix: C-t (instead of default C-b, Emacs-friendly)
# C-t ? : Show all key bindings
# C-t [ : Enter copy mode (use Emacs keys)
# C-t ] : Paste from tmux buffer
# C-t | : Split horizontally
# C-t - : Split vertically
# C-t h/j/k/l : Navigate panes (Vim-style)
# Alt + Arrow : Navigate panes (no prefix)
# Shift + Arrow : Navigate windows (no prefix)
# C-t r : Reload configuration
# C-t c : Create new window
# C-t N : Create new session
# Mouse : Scroll, select, resize panes

# ===== Initialize TPM (keep this at the very bottom) =====

# Install TPM if not installed
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
